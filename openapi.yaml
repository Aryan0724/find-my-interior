openapi: 3.0.3
info:
  title: FindMyInterior API
  description: API documentation for Bihar's largest interior, real estate, and construction marketplace.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, phone, password, role]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                password: { type: string }
                role: { type: string, enum: [customer, professional, builder, supplier, worker] }
      responses:
        '201':
          description: User created successfully
  /auth/login:
    post:
      summary: Login
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
  /homepage:
    get:
      summary: Get homepage dynamic data
      tags: [Public]
      responses:
        '200':
          description: Returns stats, categories, and featured listings
  /listings:
    get:
      summary: Get professionals directory
      tags: [Marketplace]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
      responses:
        '200':
          description: Paginated listings
  /requirements:
    post:
      summary: Submit a new lead/inquiry
      tags: [Leads]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, message, inquirable_type, inquirable_id]
              properties:
                name: { type: string }
                phone: { type: string }
                message: { type: string }
                inquirable_type: { type: string }
                inquirable_id: { type: integer }
      responses:
        '201':
          description: Inquiry sent successfully
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
