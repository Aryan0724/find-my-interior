services:
  - type: web
    name: findmyinterior-api
    env: docker
    rootDir: findmyinterior-backend
    plan: free
    healthCheckPath: /api/v1/homepage
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: DB_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
